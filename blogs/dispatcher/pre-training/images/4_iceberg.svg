<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="500" height="450" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">Fine-tune vs Pre-training</text>

  <!-- Water line -->
  <rect x="0" y="160" width="500" height="290" fill="#E3F2FD" rx="0"/>
  <line x1="0" y1="160" x2="500" y2="160" stroke="#90CAF9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="490" y="155" text-anchor="end" fill="#90CAF9" font-size="11">su yüzeyi</text>

  <!-- Iceberg top (above water) — small -->
  <polygon points="250,50 310,155 190,155" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <text x="250" y="100" text-anchor="middle" fill="#F57F17" font-size="13" font-weight="700">Fine-tune</text>
  <text x="250" y="118" text-anchor="middle" fill="#F9A825" font-size="10">"nasıl söylüyor"</text>
  <text x="250" y="132" text-anchor="middle" fill="#F9A825" font-size="10">format, davranış, sunum</text>

  <!-- Iceberg bottom (underwater) — huge -->
  <polygon points="190,165 310,165 370,320 340,400 160,400 130,320" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>

  <text x="250" y="220" text-anchor="middle" fill="#0D47A1" font-size="15" font-weight="700">Pre-training</text>
  <text x="250" y="245" text-anchor="middle" fill="#1565C0" font-size="11">"ne biliyor"</text>

  <text x="250" y="280" text-anchor="middle" fill="#1976D2" font-size="11">dil kuralları</text>
  <text x="250" y="300" text-anchor="middle" fill="#1976D2" font-size="11">olgusal bilgi</text>
  <text x="250" y="320" text-anchor="middle" fill="#1976D2" font-size="11">kavramlar arası ilişki</text>
  <text x="250" y="340" text-anchor="middle" fill="#1976D2" font-size="11">dünya modeli</text>

  <!-- Size comparison arrows -->
  <line x1="420" y1="60" x2="420" y2="150" stroke="#F9A825" stroke-width="1.5" marker-start="url(#arr2)" marker-end="url(#arr2)"/>
  <text x="440" y="110" fill="#F9A825" font-size="10">%5</text>

  <line x1="420" y1="170" x2="420" y2="395" stroke="#1565C0" stroke-width="1.5" marker-start="url(#arr3)" marker-end="url(#arr3)"/>
  <text x="440" y="285" fill="#1565C0" font-size="10">%95</text>

  <defs>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#F9A825"/>
    </marker>
    <marker id="arr3" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text x="250" y="435" text-anchor="middle" fill="#999" font-size="11" font-style="italic">Fine-tune buzdağının görünen kısmı — bilgi ve yetenek suyun altında, pre-training'de.</text>
</svg>
