<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="system-ui, -apple-system, sans-serif">
  <rect width="720" height="430" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#333" font-size="16" font-weight="700">Katman Eksikse Ne Yapmali?</text>

  <!-- Root node -->
  <rect x="240" y="48" width="240" height="42" rx="21" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="360" y="74" text-anchor="middle" fill="#333" font-size="14" font-weight="600">Hangi katman eksik?</text>

  <!-- Lines from root -->
  <line x1="290" y1="90" x2="140" y2="150" stroke="#1E88E5" stroke-width="2"/>
  <line x1="360" y1="90" x2="360" y2="150" stroke="#43A047" stroke-width="2"/>
  <line x1="430" y1="90" x2="580" y2="150" stroke="#E53935" stroke-width="2"/>

  <!-- Branch 1: Dil -->
  <rect x="30" y="150" width="220" height="40" rx="20" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="140" y="175" text-anchor="middle" fill="#1565C0" font-size="14" font-weight="700">Dil eksik</text>

  <line x1="90" y1="190" x2="90" y2="225" stroke="#1E88E5" stroke-width="1.5"/>
  <line x1="190" y1="190" x2="190" y2="225" stroke="#1E88E5" stroke-width="1.5"/>

  <rect x="20" y="225" width="140" height="55" rx="8" fill="#BBDEFB"/>
  <text x="90" y="250" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="600">Model degistir</text>
  <text x="90" y="268" text-anchor="middle" fill="#1565C0" font-size="10">Baska base model sec</text>

  <rect x="170" y="225" width="140" height="55" rx="8" fill="#BBDEFB"/>
  <text x="240" y="250" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="600">Turkce CPT</text>
  <text x="240" y="268" text-anchor="middle" fill="#1565C0" font-size="10">Continued pre-training</text>

  <!-- Branch 2: Bilgi -->
  <rect x="250" y="150" width="220" height="40" rx="20" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="360" y="175" text-anchor="middle" fill="#2E7D32" font-size="14" font-weight="700">Bilgi eksik</text>

  <line x1="310" y1="190" x2="310" y2="225" stroke="#43A047" stroke-width="1.5"/>
  <line x1="410" y1="190" x2="410" y2="225" stroke="#43A047" stroke-width="1.5"/>

  <rect x="240" y="225" width="140" height="55" rx="8" fill="#C8E6C9"/>
  <text x="310" y="250" text-anchor="middle" fill="#1B5E20" font-size="12" font-weight="600">RAG</text>
  <text x="310" y="268" text-anchor="middle" fill="#2E7D32" font-size="10">Dar terminoloji icin</text>

  <rect x="390" y="225" width="140" height="55" rx="8" fill="#C8E6C9"/>
  <text x="460" y="250" text-anchor="middle" fill="#1B5E20" font-size="12" font-weight="600">Domain CPT</text>
  <text x="460" y="268" text-anchor="middle" fill="#2E7D32" font-size="10">Genis domain bilgisi</text>

  <!-- Branch 3: Iliski -->
  <rect x="470" y="150" width="220" height="40" rx="20" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="580" y="175" text-anchor="middle" fill="#C62828" font-size="14" font-weight="700">Iliski eksik</text>

  <line x1="580" y1="190" x2="580" y2="225" stroke="#E53935" stroke-width="1.5"/>

  <rect x="510" y="225" width="140" height="55" rx="8" fill="#FFCDD2"/>
  <text x="580" y="250" text-anchor="middle" fill="#B71C1C" font-size="12" font-weight="600">Domain CPT</text>
  <text x="580" y="268" text-anchor="middle" fill="#C62828" font-size="10">RAG yetmez!</text>

  <!-- Warning box -->
  <rect x="140" y="320" width="440" height="70" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="360" y="345" text-anchor="middle" fill="#E65100" font-size="13" font-weight="700">Tehlikeli Kombinasyon</text>
  <text x="360" y="365" text-anchor="middle" fill="#E65100" font-size="11">Fact'ler tamam + iliski eksik = dogru terimlerle yanlis cikarim</text>
  <text x="360" y="382" text-anchor="middle" fill="#BF360C" font-size="10" font-style="italic">Finans gibi ciddi domain'lerde en kotu failure mode</text>

  <!-- Caption -->
  <text x="360" y="418" text-anchor="middle" fill="#999" font-size="11" font-style="italic">Fine-tune hicbir katmani kazandirmaz — sadece mevcut yeteneklerin sunum seklini degistirir.</text>
</svg>
